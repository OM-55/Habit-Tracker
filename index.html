<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Stellar Habits</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <meta name="theme-color" content="#0b0b0b">
    <link rel="manifest" href="/manifest.json">
    <link rel="icon" type="image/png" href="https://cdn-icons-png-flaticon.com/512/3248/3248443.png">
</head>
<body>
    <!-- Top Navbar -->
    <header id="top-navbar">
        <button id="menu-toggle" onclick="toggleDrawer()">☰</button>
        <h1 id="page-title">Dashboard</h1>
        <div class="header-right">
            <button id="header-add-btn" class="header-icon-btn" onclick="handleAdd()"><span>+</span></button>
            <button class="header-icon-btn" onclick="handleMenu()"><span>⋮</span></button>
        </div>
    </header>

    <!-- Main App Container -->
    <div id="app-container" class="app-layout">
        <!-- Sidebar Drawer -->
        <aside id="sidebar" class="drawer">
            <div class="sidebar-header">
                <h2>Stellar</h2>
                <button class="close-drawer" onclick="toggleDrawer()">×</button>
            </div>
            <nav id="main-nav">
                <button id="nav-dashboard" class="nav-item active" onclick="switchView('dashboard')">
                    <span class="icon">📊</span> Dashboard
                </button>
                <button id="nav-habits" class="nav-item" onclick="switchView('habits')">
                    <span class="icon">✨</span> Daily Rituals
                </button>
                <button id="nav-attendance" class="nav-item" onclick="switchView('attendance')">
                    <span class="icon">🎓</span> Attendance
                </button>
                <button id="nav-stocks" class="nav-item" onclick="switchView('stocks')">
                    <span class="icon">📈</span> Stocks
                </button>
            </nav>
        </aside>

        <!-- Overlay for Drawer -->
        <div id="drawer-overlay" class="hidden" onclick="toggleDrawer()"></div>

        <main id="app-main">
            <!-- Priority Alerter (v10.0) -->
            <div id="priority-alert-container"></div>

            <!-- Dashboard View -->
            <section id="dashboard-view" class="view">
                <div class="dashboard-grid">
                    <div class="dashboard-card glass-card" id="dashboard-expiry-card">
                        <div class="card-header"><h3>Expiry Tracker</h3></div>
                        <div id="dashboard-expiry-list" class="summary-list preview-list"></div>
                        <div class="card-footer" style="margin-top:auto;">
                            <button class="text-link" onclick="openExpiryModal()">+ Add New</button>
                        </div>
                    </div>

                    <div class="dashboard-card glass-card">
                        <div class="card-header"><h3>Daily Rituals</h3></div>
                        <div id="habits-preview-list" class="ritual-cards-container"></div>
                        <button class="text-link" onclick="navigate('habits')">View all →</button>
                    </div>

                    <div class="dashboard-card glass-card">
                        <div class="card-header">
                            <h3>Academy</h3>
                            <span id="overall-attendance-badge" class="badge">0% Overall</span>
                        </div>
                        <div id="attendance-preview-list" class="preview-list academy-list"></div>
                        <button class="text-link" onclick="navigate('attendance')">Open tracker →</button>
                    </div>

                    <div class="summary-card glass-card">
                        <div class="card-header">
                            <h3>Reminder</h3>
                        </div>
                        <div id="dashboard-reminders" class="summary-list preview-reminders"></div>
                        <div class="card-footer" style="margin-top:auto">
                            <button class="text-link" onclick="openReminderModal()">+ Add New</button>
                        </div>
                    </div>

                    <div class="summary-card glass-card">
                        <div class="card-header">
                            <h3>Stock Market</h3>
                        </div>
                        <div id="stocks-summary" class="summary-list"></div>
                        <div class="card-footer">
                            <button class="text-link" onclick="switchView('stocks')">View Tracker →</button>
                        </div>
                    </div>
                </div>
            </section>

            <!-- Habits View -->
            <section id="habits-view" class="view hidden">
                <div class="header-top">
                    <h2>Daily Rituals</h2>
                    <button class="circular-plus" onclick="openModal()">+</button>
                </div>
                <div class="stats-wrapper">
                    <div id="today-stats" class="stats-banner glass-card compact-stats">
                        <span id="completed-count">0</span> / <span id="total-count">0</span> Done Today
                        <div class="progress-bar mini"><div id="daily-progress" class="progress-fill" style="width: 0%"></div></div>
                    </div>
                </div>
                <div id="habit-list" class="content-stack"></div>
            </section>

            <!-- Attendance View -->
            <section id="attendance-view" class="view hidden">
                <button id="toggle-class-tracker" class="modern-btn mobile-only" onclick="toggleMobileClassTracker()">
                    <span>📅</span> Edit Class Tracker
                </button>
                <div class="content-stack">
                    <div id="class-tracker-wrapper" class="mobile-collapsible">
                        <div class="attendance-tracker-card glass-card">
                            <div class="header-top">
                                <h2>Class Tracker</h2>
                                <div class="toggle-control">
                                    <span class="toggle-label">Edit</span>
                                    <label class="toggle-switch">
                                        <input type="checkbox" id="edit-mode-toggle" onchange="toggleEditMode()">
                                        <span class="toggle-slider"></span>
                                    </label>
                                </div>
                            </div>
                            <div class="day-selector">
                                <button onclick="selectDay('Monday')" class="day-btn" id="day-Monday">M</button>
                                <button onclick="selectDay('Tuesday')" class="day-btn" id="day-Tuesday">T</button>
                                <button onclick="selectDay('Wednesday')" class="day-btn" id="day-Wednesday">W</button>
                                <button onclick="selectDay('Thursday')" class="day-btn" id="day-Thursday">T</button>
                                <button onclick="selectDay('Friday')" class="day-btn" id="day-Friday">F</button>
                            </div>
                            <div id="subjects-container"></div>
                            <button id="save-attendance-btn" class="primary modern-btn" onclick="saveAttendanceDay()">Save Day</button>
                        </div>
                    </div>
                    <div class="summary-card glass-card">
                        <div class="card-header"><h3>Academy Summary</h3></div>
                        <div id="attendance-summary" class="summary-list"></div>
                    </div>
                </div>
            </section>

            <!-- Stocks View -->
            <section id="stocks-view" class="view hidden">
                <div class="section-header">
                    <h2>Stock Tracker</h2>
                    <p>Live Portfolio Performance</p>
                </div>
                <div id="stocks-list" class="stocks-grid"></div>
                <!-- FAB -->
                <button class="fab-btn" onclick="openStockModal()">+</button>
            </section>
        </main>
    </div>

    <!-- Modals (Habit) -->
    <div id="habit-modal" class="modal hidden">
        <div class="modal-content glass-card dark-modal">
            <h3 id="habit-modal-title">New Ritual</h3>
            <div class="input-group">
                <input type="text" id="habit-name" placeholder="Ritual Name" class="full-input">
                <input type="text" id="habit-goal" placeholder="Daily Goal (e.g., 10m)" class="full-input">
                <div id="streak-edit-group" class="hidden" style="margin-top: 5px;">
                    <label style="font-size: 0.85rem; color: var(--text-dim); padding-left: 5px;">Streak</label>
                    <input type="number" id="habit-current-streak" placeholder="0" class="full-input" min="0" style="margin-top: 5px;">
                </div>
            </div>
            <div class="modal-actions">
                <button class="secondary modern-btn" onclick="closeModal()">Cancel</button>
                <button class="primary modern-btn" onclick="saveHabit()">Save</button>
            </div>
        </div>
    </div>

    <!-- Modals (Calendar) -->
    <div id="calendar-modal" class="modal hidden">
        <div class="modal-content glass-card dark-modal">
            <div class="calendar-header">
                <button onclick="prevMonth()">&lt;</button>
                <h3 id="calendar-month-year"></h3>
                <button onclick="nextMonth()">&gt;</button>
            </div>
            <div id="calendar-grid" class="calendar-grid"></div>
            <button class="primary modern-btn" onclick="closeCalendar()">Close</button>
        </div>
    </div>

    <!-- Modals (Reminder) -->
    <div id="reminder-modal" class="modal hidden">
        <div class="modal-content glass-card dark-modal">
            <h3>New Reminder</h3>
            <div class="input-group">
                <input type="text" id="rem-title" placeholder="Reminder title" class="full-input">
                <input type="date" id="rem-date" class="full-input">
            </div>
            <div class="modal-actions">
                <button class="secondary modern-btn" onclick="closeReminderModal()">Cancel</button>
                <button class="primary modern-btn" onclick="saveReminder()">Save</button>
            </div>
        </div>
    </div>

    <!-- Modals (Expiry) -->
    <div id="expiry-modal" class="modal hidden">
        <div class="modal-content glass-card dark-modal">
            <h3>Add Expiry Item</h3>
            <div class="input-group">
                <input type="text" id="exp-name" placeholder="Item Name (e.g., Tomato)" class="full-input">
                <input type="number" id="exp-days" placeholder="Days until expiry" class="full-input">
            </div>
            <div class="modal-actions">
                <button class="secondary modern-btn" onclick="closeExpiryModal()">Cancel</button>
                <button class="primary modern-btn" onclick="saveExpiryItem()">Save</button>
            </div>
        </div>
    </div>

    <!-- Modals (Stock) -->
    <div id="stock-modal" class="modal hidden">
        <div class="modal-content glass-card dark-modal">
            <h3 id="stock-modal-title">Add New Stock</h3>
            <div class="input-group">
                <label>Stock Symbol</label>
                <input type="text" id="stock-name" placeholder="Enter Symbol" class="full-input">
                <label>Avg Buy Price</label>
                <input type="number" id="stock-buy-price" placeholder="0.00" class="full-input">
                <label>Quantity</label>
                <input type="number" id="stock-quantity" placeholder="0" class="full-input">
            </div>
            <div class="modal-actions">
                <button class="secondary modern-btn" onclick="closeStockModal()">Cancel</button>
                <button class="primary modern-btn" onclick="saveStock()">Save</button>
            </div>
        </div>
    </div>

    <!-- Modals (Class Tracker) -->
    <div id="class-subject-modal" class="modal hidden">
        <div class="modal-content glass-card dark-modal">
            <h3>Edit Class/Subject</h3>
            <div class="input-group">
                <label>Subject Name</label>
                <input type="text" id="class-subject-name" placeholder="E.g. AP Lab" class="full-input">
                <label>Type</label>
                <input type="text" id="class-subject-type" placeholder="E.g. Lecture, Lab" class="full-input">
            </div>
            <div class="modal-actions">
                <button class="secondary modern-btn" onclick="closeClassSubjectModal()">Cancel</button>
                <button class="primary modern-btn" onclick="saveClassSubject()">Save</button>
            </div>
        </div>
    </div>

    <!-- Bottom Navigation (Mobile Only) -->
    <nav id="bottom-nav" class="mobile-nav">
        <button class="bottom-nav-item active" onclick="switchView('dashboard')">
            <span class="nav-icon">📊</span>
            <span class="nav-label">Dashboard</span>
        </button>
        <button class="bottom-nav-item" onclick="switchView('habits')">
            <span class="nav-icon">✨</span>
            <span class="nav-label">Rituals</span>
        </button>
        <button class="bottom-nav-item" onclick="switchView('attendance')">
            <span class="nav-icon">🎓</span>
            <span class="nav-label">Attendance</span>
        </button>
    </nav>

    <script src="app.js"></script>
</body>
</html>
