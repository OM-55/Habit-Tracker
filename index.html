<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Stellar Habits</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <meta name="theme-color" content="#0a0a0a">
    <link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/3248/3248443.png">
</head>
<body>
    <!-- Lock Screen -->
    <div id="lock-screen" class="overlay">
        <div class="lock-panel">
            <h1>Stellar Habits</h1>
            <p>Access Secure Space</p>
            <div class="pin-display">
                <span class="dot"></span>
                <span class="dot"></span>
                <span class="dot"></span>
                <span class="dot"></span>
            </div>
            <div class="pin-pad">
                <button onclick="inputPin(1)">1</button>
                <button onclick="inputPin(2)">2</button>
                <button onclick="inputPin(3)">3</button>
                <button onclick="inputPin(4)">4</button>
                <button onclick="inputPin(5)">5</button>
                <button onclick="inputPin(6)">6</button>
                <button onclick="inputPin(7)">7</button>
                <button onclick="inputPin(8)">8</button>
                <button onclick="inputPin(9)">9</button>
                <button onclick="inputPin(0)">0</button>
                <button onclick="clearPin()" class="action">Clear</button>
            </div>
        </div>
    </div>

    <!-- Main Dashboard with Sidebar -->
    <div id="app-container" class="hidden">
        <aside id="sidebar">
            <div class="sidebar-header">
                <h1>Stellar</h1>
            </div>
            <nav id="main-nav">
                <button id="nav-dashboard" class="nav-item active" onclick="switchView('dashboard')">
                    <span class="icon">📊</span> Dashboard
                </button>
                <button id="nav-habits" class="nav-item" onclick="switchView('habits')">
                    <span class="icon">✨</span> Daily Rituals
                </button>
                <button id="nav-attendance" class="nav-item" onclick="switchView('attendance')">
                    <span class="icon">🎓</span> Attendance
                </button>
                <button id="nav-reminders" class="nav-item" onclick="switchView('reminders')">
                    <span class="icon">🔔</span> Reminders
                </button>
            </nav>
        </aside>

        <main id="app-main">
            <!-- Dashboard View -->
            <section id="dashboard-view" class="view">
                <header class="section-header">
                    <h2>Summary</h2>
                    <p class="subtitle">Overview of your progress</p>
                </header>

                <div class="dashboard-grid">
                    <!-- Habits Quick Preview -->
                    <div class="dashboard-card glass-card">
                        <div class="card-header">
                            <h3>Daily Rituals</h3>
                        </div>
                        <div id="habits-preview-list" class="preview-list scrollable-list">
                            <!-- Top 3 habits injected here -->
                        </div>
                        <button class="text-link" onclick="switchView('habits')">View all →</button>
                    </div>

                    <!-- Attendance Quick Preview -->
                    <div class="dashboard-card glass-card">
                        <div class="card-header">
                            <h3>Academy</h3>
                        </div>
                        <div id="attendance-preview-list" class="preview-list scrollable-list academy-list">
                            <!-- Subject percentages injected here -->
                        </div>
                        <button class="text-link" onclick="switchView('attendance')">Open tracker →</button>
                    </div>

                    <!-- Reminders Section -->
                    <div class="dashboard-card glass-card reminders-card">
                        <div class="card-header">
                            <h3>Reminders</h3>
                            <button id="add-reminder-btn" class="icon-btn-small" onclick="openReminderModal()">+</button>
                        </div>
                        <div id="reminders-list" class="preview-list scrollable-list">
                            <!-- Reminders injected here -->
                        </div>
                        <button class="text-link" onclick="switchView('reminders')">Open list →</button>
                    </div>
                </div>
            </section>

            <!-- Habits View -->
            <section id="habits-view" class="view hidden">
                <header class="section-header no-border">
                    <div class="header-top">
                        <h2>Daily Rituals</h2>
                        <button id="view-add-habit-btn" class="icon-btn" onclick="openModal()">+</button>
                    </div>
                    <div id="today-stats" class="stats-banner glass-card">
                        <p><span id="completed-count">0</span> / <span id="total-count">0</span> Done Today</p>
                        <div class="progress-bar mini">
                            <div id="daily-progress" class="progress-fill" style="width: 0%"></div>
                        </div>
                    </div>
                </header>

                <div id="habit-list">
                    <!-- Habits injected here -->
                </div>
            </section>

            <!-- Attendance View (STRECHED/SPLIT) -->
            <section id="attendance-view" class="view split-view hidden">
                <div class="split-left sticky-column">
                    <header class="section-header">
                        <div class="header-top">
                            <h2>Class Tracker</h2>
                            <div class="controls-group">
                                <label class="toggle-control">
                                    <input type="checkbox" id="edit-mode-toggle" onchange="toggleEditMode()">
                                    <span class="toggle-slider"></span>
                                    <span class="toggle-label">Edit Mode</span>
                                </label>
                                <div id="selected-date-display" class="date-badge"></div>
                            </div>
                        </div>
                        
                        <div class="day-selector-container">
                            <div class="day-selector">
                                <button onclick="selectDay('Monday')" class="day-btn" id="day-Monday">Mon</button>
                                <button onclick="selectDay('Tuesday')" class="day-btn" id="day-Tuesday">Tue</button>
                                <button onclick="selectDay('Wednesday')" class="day-btn" id="day-Wednesday">Wed</button>
                                <button onclick="selectDay('Thursday')" class="day-btn" id="day-Thursday">Thu</button>
                                <button onclick="selectDay('Friday')" class="day-btn" id="day-Friday">Fri</button>
                            </div>
                        </div>
                    </header>

                    <div class="attendance-tracker-card glass-card">
                        <div id="subjects-container">
                            <!-- Today's subjects injected here -->
                        </div>
                        <button id="save-attendance-btn" class="primary save-day-btn" onclick="saveAttendanceDay()">Save Day</button>
                    </div>
                </div>

                <div class="split-right scroll-column">
                    <header class="section-header">
                        <h2>Academy Summary</h2>
                    </header>
                    <div id="attendance-summary" class="summary-list">
                        <!-- Stats injected here -->
                    </div>
                </div>
            </section>

            <!-- Reminders View (NEW) -->
            <section id="reminders-view" class="view hidden">
                <header class="section-header no-border">
                    <div class="header-top">
                        <h2>Reminders</h2>
                        <button class="icon-btn circular-plus" onclick="openReminderModal()">+</button>
                    </div>
                </header>
                <div id="full-reminders-list" class="reminders-full-list">
                    <!-- Full reminders list injected here -->
                </div>
            </section>
        </main>
    </div>

    <!-- Habit Modal -->
    <div id="habit-modal" class="modal hidden">
        <div class="modal-content centered-modal">
            <h3 id="modal-title">New Habit</h3>
            <div class="modal-body">
                <div class="input-group">
                    <label for="habit-name">What's the habit?</label>
                    <input type="text" id="habit-name" placeholder="e.g., Morning Meditation" autocomplete="off">
                </div>
                <div class="input-group">
                    <label for="habit-goal">Daily Goal (optional)</label>
                    <input type="text" id="habit-goal" placeholder="e.g., 10 minutes">
                </div>
            </div>
            <div class="modal-actions">
                <button class="secondary" onclick="closeModal()">Cancel</button>
                <button class="primary" onclick="saveHabit()">Save Habit</button>
            </div>
        </div>
    </div>

    <!-- Calendar View Modal (Keep existing) -->
    <div id="calendar-modal" class="modal hidden">
        <div class="modal-content calendar-container">
            <div class="calendar-header">
                <button onclick="prevMonth()">&lt;</button>
                <h3 id="calendar-month-year">March 2026</h3>
                <button onclick="nextMonth()">&gt;</button>
            </div>
            <div class="calendar-days">
                <span>Sun</span><span>Mon</span><span>Tue</span><span>Wed</span><span>Thu</span><span>Fri</span><span>Sat</span>
            </div>
            <div id="calendar-grid" class="calendar-grid">
                <!-- Days will be injected here -->
            </div>
            <div class="modal-actions">
                <button class="primary" onclick="closeCalendar()">Close</button>
            </div>
        </div>
    </div>

    <!-- Reminder Modal -->
    <div id="reminder-modal" class="modal hidden">
        <div class="modal-content glass-card centered-modal dark-modal">
            <h3 id="rem-modal-title">New Reminder</h3>
            <div class="modal-body">
                <div class="input-group">
                    <label for="rem-title">What's the reminder?</label>
                    <input type="text" id="rem-title" placeholder="e.g., Physics Midterm" autocomplete="off" class="full-input">
                </div>
                <div class="input-group">
                    <label for="rem-date">When?</label>
                    <input type="date" id="rem-date" class="full-input">
                </div>
            </div>
            <div class="modal-actions">
                <button class="text-btn secondary" onclick="closeReminderModal()">Cancel</button>
                <button class="primary modern-btn" onclick="saveReminder()">Save Reminder</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
